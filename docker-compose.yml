version: "3.9"

# ALIS Java Backend - Local Docker Compose
#
# Prerequisites:
#   1. config/.env file (copy from config/.env.example and fill in values)
#   2. Optional Firebase key at config/firebase-service-account.json
#
# Run:
#   docker compose up --build
#
# Swagger UI:
#   http://localhost:8080/swagger-ui/index.html
#
# Health check:
#   http://localhost:8080/health

services:
  alis-java:
    build:
      context: .
      dockerfile: Dockerfile
    image: alis-backend:local
    container_name: alis-java
    restart: unless-stopped
    ports:
      - "8080:8080"

    env_file:
      - ./config/.env

    environment:
      SPRING_PROFILES_ACTIVE: dev
      FIREBASE_SERVICE_ACCOUNT: /app/config/firebase-service-account.json
      ALIS_CORS_ALLOWED_ORIGIN_PATTERNS: "*"
      PORT: 8080

    volumes:
      - ./config/firebase-service-account.json:/app/config/firebase-service-account.json:ro

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: "30s"
      timeout: "10s"
      retries: 5
      start_period: "90s"
