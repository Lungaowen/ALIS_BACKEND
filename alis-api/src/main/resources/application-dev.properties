# =========================
# DEV PROFILE OVERRIDES
# =========================

alis.cors.allowed-origin-patterns=*

spring.jpa.show-sql=true

springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

spring.jpa.hibernate.ddl-auto=${DDL_MODE:none}

# Firebase disabled by default for local dev; override with ALIS_FIREBASE_ENABLED=true
alis.firebase.enabled=${ALIS_FIREBASE_ENABLED:false}

# ✅ ADD THESE — Supabase database connection
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.open-in-view=false
