# Module toggles (disable a module without removing its JAR from the classpath)
alis.modules.user.enabled=true
alis.modules.auth.enabled=true
alis.modules.ai.enabled=true
alis.modules.legal.enabled=true

# JWT (override via environment or .env)
alis.jwt.secret=${ALIS_JWT_SECRET}
alis.jwt.expiration=${ALIS_JWT_EXPIRATION:86400000}

# AI (optional — pipeline degrades when key is absent)
alis.ai.groq.key=${ALIS_AI_GROQ_KEY:${GROQ_API_KEY:}}
alis.ai.groq.model=${ALIS_AI_GROQ_MODEL:${GROQ_MODEL:llama-3.3-70b-versatile}}
alis.ai.groq.url=${ALIS_AI_GROQ_URL:${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}}

# Firebase (optional for local dev)
alis.firebase.enabled=${ALIS_FIREBASE_ENABLED:false}
firebase.bucket.name=${FIREBASE_BUCKET_NAME:}
firebase.service.account=${FIREBASE_SERVICE_ACCOUNT:}

# Report PDF artifacts (S3)
alis.reports.storage.s3.enabled=${ALIS_REPORTS_S3_ENABLED:false}
alis.reports.storage.s3.bucket=${ALIS_REPORTS_S3_BUCKET:}
alis.reports.storage.s3.region=${ALIS_REPORTS_S3_REGION:us-east-1}
alis.reports.storage.s3.prefix=${ALIS_REPORTS_S3_PREFIX:reports}
alis.reports.storage.s3.signed-url-duration-minutes=${ALIS_REPORTS_S3_SIGNED_URL_MINUTES:60}
alis.reports.storage.s3.endpoint=${ALIS_REPORTS_S3_ENDPOINT:}
alis.reports.storage.s3.access-key-id=${ALIS_REPORTS_S3_ACCESS_KEY_ID:${AWS_ACCESS_KEY_ID:}}
alis.reports.storage.s3.secret-access-key=${ALIS_REPORTS_S3_SECRET_ACCESS_KEY:${AWS_SECRET_ACCESS_KEY:}}

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
