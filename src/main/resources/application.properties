# =========================
# DATABASE CONFIG (PostgreSQL / Supabase)
# =========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# =========================
# APPLICATION SETTINGS
# =========================
alis.jwt.secret=${ALIS_JWT_SECRET}
alis.jwt.expiration=${ALIS_JWT_EXPIRATION:86400000}
alis.ai.groq.key=${GROQ_API_KEY:}
alis.seed.admin.name=${ALIS_SEED_ADMIN_NAME:System Admin}
alis.seed.admin.email=${ALIS_SEED_ADMIN_EMAIL:}
alis.seed.admin.password=${ALIS_SEED_ADMIN_PASSWORD:}
alis.cors.allowed-origin-patterns=${ALIS_CORS_ALLOWED_ORIGIN_PATTERNS:*}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${DDL_MODE:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.open-in-view=false

# =========================
# SERVER
# =========================
server.port=${PORT:8081}
server.address=0.0.0.0

# =========================
# FIREBASE STORAGE
# =========================
firebase.bucket.name=${FIREBASE_BUCKET_NAME}
firebase.service.account=${FIREBASE_SERVICE_ACCOUNT:}

# =========================
# FILE UPLOAD LIMITS
# =========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =========================
# JACKSON
# =========================
spring.jackson.serialization.write-enums-using-to-string=true
spring.jackson.deserialization.read-enums-using-to-string=true

# =========================
# PERFORMANCE
# =========================
spring.task.execution.pool.core-size=8
