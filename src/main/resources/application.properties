# =========================
# DATABASE CONFIG (SUPABASE)
# =========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# HIKARI — SUPABASE PGBOUNCER FIX
# =========================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-init-sql=SELECT 1

# ✅ CORRECT keys for disabling prepared statements (required for PgBouncer)
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheSizeMiB=0

# =========================
# JPA / HIBERNATE
# =========================
# ✅ Only ONE ddl-auto — use 'update' during development
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ✅ REMOVED dialect line — Hibernate 6 auto-detects PostgreSQL

# =========================
# FILE UPLOAD LIMITS
# =========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =========================
# SERVER (RENDER PORT FIX)
# =========================
server.port=${PORT:8080}

# =========================
# PERFORMANCE
# =========================
spring.jpa.open-in-view=false