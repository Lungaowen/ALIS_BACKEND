# =========================
# DEV PROFILE OVERRIDES
# =========================
# Activate with: SPRING_PROFILES_ACTIVE=dev
# Or in IDE run config: -Dspring.profiles.active=dev

# Accept all browser origins locally — no need to whitelist localhost ports
alis.cors.allowed-origin-patterns=*

# Show SQL in console during development
spring.jpa.show-sql=true

# Swagger on in dev so you can browse the API
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# Looser DDL in dev — Hibernate auto-creates/updates tables
spring.jpa.hibernate.ddl-auto=update
