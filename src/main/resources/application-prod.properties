# =========================
# PROD PROFILE OVERRIDES
# =========================
# Activated automatically on Render via:
#   SPRING_PROFILES_ACTIVE=prod

# Browser CORS — set ALIS_CORS_ALLOWED_ORIGIN_PATTERNS in Render dashboard.
# Add your web frontend URL(s) here once you have them, comma-separated.
# Android, JavaFX, and other native clients are unaffected by this.
# Examples:
#   https://alis-app.vercel.app
#   https://alis-app.vercel.app,https://staging.alis-app.vercel.app
#   * (wildcard — open to all browsers, fine while frontend URL is unknown)
alis.cors.allowed-origin-patterns=${ALIS_CORS_ALLOWED_ORIGIN_PATTERNS:*}

# No SQL logging in production
spring.jpa.show-sql=false

# Swagger off — API docs not exposed publicly
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Safer DDL in production — validate schema matches entities, never auto-alter
# Switch from 'update' to 'validate' once your schema is stable
spring.jpa.hibernate.ddl-auto=${DDL_MODE:update}

# Larger connection pool for production load
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
